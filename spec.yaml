schemaVersion: "2"
kind: mixin
name: firecrawl
displayName: Firecrawl (live web access)
description: "Adds live web search/scrape/crawl to any agent via the firecrawl-py SDK, wired to Firecrawl's cloud API. Needs a key: sbx secret set -g firecrawl (the kit holds no key)."

# Egress allowlist (deny-by-default). Install reaches PyPI; runtime calls go to
# Firecrawl's cloud API. Credential injection (below) also requires its target
# domain to be reachable here.
caps:
  network:
    allow:
      - pypi.org
      - files.pythonhosted.org
      - api.firecrawl.dev

# The kit declares WHAT it needs (service id + where to inject the key); the user
# declares WHERE the key lives (sbx secret store, or a binding in
# ~/.config/sbx/credentials.yaml). The Firecrawl SDK sends the key as a Bearer
# token, so the proxy swaps the in-container sentinel into the Authorization
# header on outbound requests to api.firecrawl.dev. FIRECRAWL_API_KEY never
# enters the kit image or the sandbox filesystem.
credentials:
  - service: firecrawl
    apiKey:
      name: FIRECRAWL_API_KEY
      inject:
        - domain: api.firecrawl.dev
          header: Authorization
          format: "Bearer %s"

commands:
  install:
    - command: "pip install --break-system-packages 'firecrawl-py==4.30.1'"
      user: "1000"
      description: "Install the Firecrawl Python SDK"

agentContext: |
  ## Firecrawl — live web access

  The `firecrawl-py` SDK is installed and the `FIRECRAWL_API_KEY` credential is
  injected by the sbx proxy on requests to api.firecrawl.dev, so you can fetch
  current, LLM-ready web data instead of relying on training-cutoff knowledge or
  guessing about live pages.

      from firecrawl import Firecrawl
      fc = Firecrawl()                                 # key handled by the sbx proxy

      fc.scrape("https://example.com", formats=["markdown"])   # one page -> clean markdown
      fc.search("docker sandboxes mixin kit", limit=5)         # search the web, get page content
      fc.crawl("https://docs.example.com", limit=20)           # crawl a whole site/section

  Reach for this whenever a task needs facts beyond your knowledge cutoff, the
  contents of a specific URL, or a sweep across a documentation site.
